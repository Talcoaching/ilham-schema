<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Training Schema - Tal&coaching</title>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,wght@0,400;0,700;0,900;1,400;1,700&family=Nunito:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#2D4A3E;--cream:#FDFBF3;--gold:#C97B1A;--teal:#2A7A8C;
  --muted:#6b7c76;--border:#ddd8cc;--white:#fff;--rose:#9B4F6A;
  --up:#27ae60;--dn:#e74c3c;
}
body{background:var(--cream);font-family:'Nunito',sans-serif;font-size:14px;color:var(--green);min-height:100vh}

/* LOGIN */
#loginScreen{display:none;align-items:center;justify-content:center;min-height:100vh;padding:20px}
#loginScreen.show{display:flex}
.lcard{background:var(--white);border-radius:20px;max-width:380px;width:100%;box-shadow:0 4px 24px rgba(0,0,0,.08);overflow:hidden}
.lcard-top{background:var(--green);padding:26px 28px 22px;position:relative}
.lcard-top::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--teal))}
.lcard-logo{height:24px;filter:brightness(0) invert(1)}
.lcard-body{padding:28px}
.lcard-title{font-family:'Fraunces',serif;font-size:1.5rem;font-weight:900;color:var(--green);margin-bottom:8px}
.lcard-sub{font-size:13px;color:var(--muted);line-height:1.6;margin-bottom:20px}
.lcard-input{width:100%;border:1.5px solid var(--border);border-radius:10px;padding:11px 14px;font-family:'Nunito',sans-serif;font-size:14px;color:var(--green);outline:none;background:var(--cream);margin-bottom:12px}
.lcard-input:focus{border-color:var(--teal);background:#fff}
.lcard-btn{width:100%;background:var(--green);color:#fff;border:none;border-radius:10px;padding:13px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.lcard-btn:disabled{background:var(--muted);cursor:not-allowed}
.lcard-msg{margin-top:12px;font-size:13px;font-weight:600;min-height:18px;text-align:center}
.lcard-msg.success{color:var(--teal)}
.lcard-msg.error{color:var(--dn)}

/* APP */
#appScreen{display:none}
#appScreen.show{display:block}
.header{background:var(--green);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--rose),var(--gold),var(--teal))}
.header-logo{height:20px;filter:brightness(0) invert(1)}
.header-right{display:flex;align-items:center;gap:8px}
.header-name{font-family:'Fraunces',serif;font-size:.85rem;font-style:italic;color:rgba(255,255,255,.7)}
.sync-status{font-size:10px;font-weight:700;color:rgba(255,255,255,.45)}

.day-toggle{background:var(--white);border-bottom:1px solid var(--border);padding:10px 14px;display:flex;gap:8px;position:sticky;top:51px;z-index:100}
.day-btn{flex:1;padding:8px;border-radius:10px;border:1.5px solid var(--border);background:var(--cream);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer;text-align:center}
.day-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.day-btn .day-label{display:block;font-size:9px;font-weight:400;opacity:.7;margin-top:2px}

.week-nav{background:var(--white);border-bottom:1px solid var(--border);padding:8px 14px;display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;position:sticky;top:99px;z-index:99}
.week-nav::-webkit-scrollbar{display:none}
.week-btn{flex-shrink:0;padding:4px 10px;border-radius:16px;border:1.5px solid var(--border);background:var(--cream);font-family:'Nunito',sans-serif;font-size:11px;font-weight:700;color:var(--muted);cursor:pointer}
.week-btn.active{background:var(--green);border-color:var(--green);color:#fff}
.week-btn.has-data{border-color:var(--teal);color:var(--teal)}

.container{max-width:720px;margin:0 auto;padding:14px 13px 100px}
.week-meta{margin-bottom:12px;padding:0 4px}
.week-label{font-family:'Fraunces',serif;font-size:1.2rem;font-weight:900}
.week-label span{font-style:italic;color:var(--gold)}
.phase-badge{display:inline-block;font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;padding:3px 10px;border-radius:20px;margin-top:4px}
.p1{background:#edf2f0;color:var(--green)}
.p2{background:#fdf6ec;color:var(--gold)}
.p3{background:#eef7f9;color:var(--teal)}

.warmup-card{background:var(--green);border-radius:12px;padding:12px 15px;margin-bottom:12px}
.warmup-title{font-size:11px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--gold);margin-bottom:6px}
.warmup-text{font-size:13px;color:rgba(255,255,255,.8);line-height:1.6}

.exercise{background:var(--white);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:10px}
.ex-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.ex-name{font-weight:700;font-size:14px;color:var(--green);flex:1}
.ex-tag{font-size:9px;font-weight:800;letter-spacing:.5px;text-transform:uppercase;padding:2px 7px;border-radius:10px;flex-shrink:0;margin-top:2px}
.tag-compound{background:#edf2f0;color:var(--green)}
.tag-isolation{background:#fdf6ec;color:var(--gold)}
.tag-core{background:#eef7f9;color:var(--teal)}
.tag-upper{background:#f0edf8;color:#6c3483}
.ex-badges{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:6px}
.badge{font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
.badge-reps{background:#fce8ef;color:var(--rose)}
.badge-rir{background:#eef7f9;color:var(--teal)}
.ex-note{font-size:11px;color:var(--teal);font-style:italic;padding:5px 8px;background:#eef7f9;border-radius:6px;margin-bottom:7px;line-height:1.5}
.ex-progress{font-size:11px;color:var(--gold);padding:5px 8px;background:#fdf6ec;border-radius:6px;margin-bottom:7px;line-height:1.5}
.ex-progress span{font-weight:400;color:var(--muted)}

.set-hdr{display:grid;grid-template-columns:20px 1fr 1fr 1fr 44px;gap:4px;margin-bottom:3px}
.set-row{display:grid;grid-template-columns:20px 1fr 1fr 1fr 44px;gap:4px;align-items:center;margin-bottom:3px}
.col-hdr{font-size:9px;font-weight:800;text-transform:uppercase;color:var(--muted);text-align:center}
.set-num{font-size:11px;color:var(--muted);font-weight:700;text-align:center}
input[type="text"]{width:100%;background:var(--cream);border:1px solid var(--border);border-radius:7px;padding:5px 3px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--green);text-align:center;outline:none}
input[type="text"]:focus{border-color:var(--teal);background:#fff}
input::placeholder{color:#ccc;font-size:10px}

.vol-bar{margin-top:6px;padding:6px 9px;background:var(--cream);border-radius:8px;border:1px solid var(--border)}
.vol-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:3px}
.vol-num{font-size:11px;font-weight:700}
.vol-diff{font-size:11px;font-weight:700}
.vol-track{height:3px;background:var(--border);border-radius:4px;overflow:hidden}
.vol-fill{height:100%;border-radius:4px;transition:width .3s}

.notes-block{background:#fafaf7;border:1px solid var(--border);border-radius:10px;padding:10px 13px;margin-bottom:10px}
.notes-label{font-size:10px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--muted);display:block;margin-bottom:4px}
textarea{width:100%;background:#fff;border:1px solid var(--border);border-radius:7px;padding:6px 8px;font-family:'Nunito',sans-serif;font-size:12px;color:var(--green);outline:none;resize:none;height:48px}
textarea:focus{border-color:var(--teal)}

.save-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 16px;display:flex;gap:10px;align-items:center;z-index:100}
.btn-save{flex:1;background:var(--green);color:#fff;border:none;border-radius:10px;padding:12px;font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer}
.save-msg{font-size:12px;color:var(--teal);font-weight:700;display:none;min-width:80px}

.lang-toggle{display:flex;gap:3px;background:rgba(255,255,255,.1);border-radius:18px;padding:3px}
.lang-btn{background:transparent;border:none;color:rgba(255,255,255,.55);font-family:'Nunito',sans-serif;font-size:10px;font-weight:700;padding:4px 9px;border-radius:16px;cursor:pointer}
.lang-btn.active{background:#fff;color:var(--green)}
</style>
</head>

    'Bulgarian Split Squat': {name:'Fente bulgare', note:'Pied arriere sur un banc derriere toi, la jambe avant fait le travail. Descends jusqu\'a ce que le genou avant soit a environ 90 degres, pousse par le talon avant pour remonter.', progress:'S1-4 : Poids du corps, focus sur l\'equilibre et la profondeur. S5+ : ajoute des halteres legers.'},
    'Hollow Hold': {name:'Hollow hold', note:'Allonge sur le dos, bas du dos plat au sol. Bras et jambes legerement souleves. Garde le bas du dos plaque.', progress:'S1-4 : 15 sec. S5-8 : 20 sec. S9-12 : 25 sec.'},
    'Leg Press': {name:'Presse a cuisses', note:'Pieds largeur d\'epaules sur la plateforme. Descends avec controle, pousse par les talons. Ne bloque pas completement les genoux en haut.', progress:'S1-4 : Charge legere, apprends l\'amplitude. S5-8 : augmente progressivement. S9-12 : surcharge progressive.'},
    'Machine Chest Press': {name:'Developpe couche machine', note:'La machine donne plus de stabilite que les poids libres pour debutant. Pousse vers l\'avant, controle le retour.', progress:'S1-4 : Poids leger, focus sur la forme. S5+ : progresse chaque semaine.'},
    'Single Leg Glute Bridge': {name:'Pont fessier unilateral', note:'Allonge sur le dos, une jambe tendue. Pousse par le talon de la jambe au sol pour lever les hanches. Serre les fessiers en haut.', progress:'S1-4 : Poids du corps uniquement. S5+ : ajoute une pause en haut pour plus de tension.'},
    'Machine Row': {name:'Rowing machine', note:'Poitrine contre le support. Tire les poignees vers tes flancs. Extension et contraction completes a chaque repetition.', progress:'S1-4 : Poids leger, apprends le mouvement. S5+ : progresse chaque semaine.'},
    'Cable Bicep Curl': {name:'Curl biceps a la poulie', note:'La poulie offre une tension constante. Les coudes restent fixes sur les cotes. Amplitude complete.', progress:'S1-4 : Poids leger, focus sur la forme. S5+ : progresse chaque semaine.'},
    'Lying Leg Raise': {name:'Releve de jambes allonge', note:'Allonge sur le dos, jambes tendues. Bas du dos plaque au sol. Leve les jambes jusqu\'a environ 90 degres, puis redescends lentement sans cambrer le dos.', progress:'S1-4 : Flechis legerement les genoux si necessaire pour garder le bas du dos plat. S5+ : tends completement les jambes pour plus de defi.'},
    'Hip Thrust': {name:'Hip thrust', note:'Banc a hauteur d\'epaule. Pousse les hanches vers le haut, serre fort les fessiers en haut. Menton rentre, regard droit. Excellent exercice pour les fessiers chez les debutants.', progress:'S1-4 : Poids du corps ou charge legere, focus sur la contraction. S5-8 : ajoute du poids progressivement. S9-12 : vise des charges plus lourdes avec une bonne forme.'},
    'Hip Thrust (1 sec hold)': {name:'Hip thrust (pause 1 sec)', note:'Banc a hauteur d\'epaule. Pousse les hanches vers le haut, tiens 1 seconde en haut en serrant fort les fessiers, puis redescends avec controle.', progress:'S1-4 : Poids du corps ou charge legere, focus sur la contraction. S5-8 : ajoute du poids progressivement. S9-12 : charges plus lourdes en gardant la pause de 1 sec.'},
    'Cable Kickback': {name:'Kickback a la poulie', note:'Manchette de cheville attachee au cable, penche-toi legerement en avant. Donne un coup de jambe tendue vers l\'arriere, serre le fessier en haut. Retour lent, pas de balancement.', progress:'S1-4 : Poids leger, focus sur la contraction. S5+ : progresse chaque semaine.'},
    'Machine Abduction': {name:'Abduction machine', note:'Assieds-toi dans la machine, pousse les genoux vers l\'exterieur contre les coussinets. Controle le retour - ne laisse pas le poids revenir brusquement.', progress:'S1-4 : Poids leger, construis la connexion esprit-muscle. S5+ : progresse chaque semaine.'}
  }
};

function getPhase(w){
  const t = UI_TEXT[LANG];
  if(w<=4) return {label:t.phase1,cls:'p1',rir:'RIR 3-4'};
  if(w<=8) return {label:t.phase2,cls:'p2',rir:'RIR 2-3'};
  return {label:t.phase3,cls:'p3',rir:'RIR 1-2'};
}

function getExName(name){
  if(LANG==='fr' && SCHEMA_TRANSLATIONS.fr[name]) return SCHEMA_TRANSLATIONS.fr[name].name;
  return name;
}
function getExNote(name, fallback){
  if(LANG==='fr' && SCHEMA_TRANSLATIONS.fr[name]) return SCHEMA_TRANSLATIONS.fr[name].note;
  return fallback;
}
function getExProgress(name, fallback){
  if(LANG==='fr' && SCHEMA_TRANSLATIONS.fr[name]) return SCHEMA_TRANSLATIONS.fr[name].progress;
  return fallback;
}

function fKey(w,di,ei,s,t){return `bfb_w${w}_d${di}_e${ei}_s${s}_${t}`;}
function nKey(w,di){return `bfb_w${w}_d${di}_notes`;}

async function sbUpsert(row){
  try{
    await fetch(SUPABASE_URL+'/rest/v1/training_sessions',{
      method:'POST',
      headers:{'Content-Type':'application/json','apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY,'Prefer':'resolution=merge-duplicates'},
      body:JSON.stringify(row)
    });
  }catch(e){console.warn('sync failed',e);}
}

async function sbLoad(w,di){
  try{
    const r=await fetch(SUPABASE_URL+'/rest/v1/training_sessions?client=eq.'+CLIENT+'&week=eq.'+w+'&day=eq.'+di,{
      headers:{'apikey':SUPABASE_KEY,'Authorization':'Bearer '+SUPABASE_KEY}
    });
    const rows=await r.json();
    if(Array.isArray(rows)) rows.forEach(row=>{
      if(row.weight) localStorage.setItem(fKey(w,di,row.exercise,row.set_num,'w'),row.weight);
      if(row.reps)   localStorage.setItem(fKey(w,di,row.exercise,row.set_num,'r'),row.reps);
      if(row.rir)    localStorage.setItem(fKey(w,di,row.exercise,row.set_num,'rir'),row.rir);
      if(row.notes)  localStorage.setItem(nKey(w,di),row.notes);
    });
  }catch(e){console.warn('load failed',e);}
}

function getVol(w,di,ei){
  const ex=SCHEMA[di].exercises[ei];
  let t=0;
  for(let s=0;s<ex.sets;s++){
    const wv=parseFloat(localStorage.getItem(fKey(w,di,ei,s,'w')))||0;
    const rv=parseFloat(localStorage.getItem(fKey(w,di,ei,s,'r')))||0;
    t+=wv*rv;
  }
  return Math.round(t);
}

function getPrev(w,di,ei){
  for(let pw=w-1;pw>=1;pw--){const v=getVol(pw,di,ei);if(v>0) return {vol:v,week:pw};}
  return null;
}

function volHTML(di,ei){
  const t = UI_TEXT[LANG];
  const cur=getVol(CW,di,ei);
  const prev=getPrev(CW,di,ei);
  let diffTxt=t.firstMeasurement,diffColor='var(--muted)';
  if(prev){
    const d=cur-prev.vol;
    if(d>0){diffTxt='+'+d+' kg (w'+prev.week+')';diffColor='var(--up)';}
    else if(d<0){diffTxt=d+' kg (w'+prev.week+')';diffColor='var(--dn)';}
    else diffTxt=t.same;
  }
  let maxVol=cur;
  for(let w2=1;w2<=WEEKS;w2++){const v=getVol(w2,di,ei);if(v>maxVol)maxVol=v;}
  const pct=maxVol>0?Math.round((cur/maxVol)*100):0;
  const barColor=cur===0?'var(--border)':!prev?'var(--teal)':cur>=prev.vol?'var(--up)':'var(--dn)';
  return `<div class="vol-bar"><div class="vol-top"><span class="vol-num">${cur>0?cur+' kg':t.fillIn}</span><span class="vol-diff" style="color:${diffColor}">${diffTxt}</span></div><div class="vol-track"><div class="vol-fill" style="width:${pct}%;background:${barColor}"></div></div></div>`;
}

function buildNav(){
  const nav=document.getElementById('weekNav');
  nav.innerHTML='';
  for(let w=1;w<=WEEKS;w++){
    const btn=document.createElement('button');
    btn.className='week-btn'+(w===CW?' active':'');
    let hasData=false;
    SCHEMA[CD].exercises.forEach((ex,ei)=>{
      for(let s=0;s<ex.sets;s++) if(localStorage.getItem(fKey(w,CD,ei,s,'w'))) hasData=true;
    });
    if(hasData&&w!==CW) btn.classList.add('has-data');
    btn.textContent='W'+w;
    btn.onclick=async()=>{CW=w;await sbLoad(w,CD);buildNav();renderWeek();};
    nav.appendChild(btn);
  }
}

function renderWeek(){
  const t = UI_TEXT[LANG];
  const c=document.getElementById('mainContent');
  const phase=getPhase(CW);
  const dayDef=SCHEMA[CD];
  c.innerHTML=`<div class="week-meta"><div class="week-label">${t.week} <span>${CW}</span> ${t.of} ${WEEKS}</div><div class="phase-badge ${phase.cls}">${phase.label} - ${phase.rir}</div></div>
  <div class="warmup-card"><div class="warmup-title">${t.warmup}</div><div class="warmup-text">${dayDef.warmup}</div></div>`;

  dayDef.exercises.forEach((ex,ei)=>{
    const vals=[];
    for(let s=0;s<ex.sets;s++){
      vals.push({
        w:localStorage.getItem(fKey(CW,CD,ei,s,'w'))||'',
        r:localStorage.getItem(fKey(CW,CD,ei,s,'r'))||'',
        rir:localStorage.getItem(fKey(CW,CD,ei,s,'rir'))||''
      });
    }

    const showProg = ex.progress && CW<=8;
    const exName = getExName(ex.name);
    const exNote = getExNote(ex.name, ex.note);
    const exProgress = getExProgress(ex.name, ex.progress);

    let rows=`<div class="set-hdr"><span></span><span class="col-hdr">${t.set}</span><span class="col-hdr">${t.kg}</span><span class="col-hdr">${t.reps}</span><span class="col-hdr">${t.rir}</span></div>`;
    for(let s=0;s<ex.sets;s++){
      rows+=`<div class="set-row">
        <div class="set-num">${s+1}</div>
        <div style="font-size:10px;color:var(--muted);text-align:center">${t.set.toLowerCase()} ${s+1}</div>
        <input type="text" placeholder="-" value="${vals[s].w}" data-di="${CD}" data-ei="${ei}" data-s="${s}" data-t="w" oninput="liveUpdate(this)" onchange="autoSave(this)">
        <input type="text" placeholder="-" value="${vals[s].r}" data-di="${CD}" data-ei="${ei}" data-s="${s}" data-t="r" oninput="liveUpdate(this)" onchange="autoSave(this)">
        <input type="text" placeholder="?" value="${vals[s].rir}" data-di="${CD}" data-ei="${ei}" data-s="${s}" data-t="rir" onchange="autoSave(this)">
      </div>`;
    }

    c.innerHTML+=`<div class="exercise">
      <div class="ex-top"><div class="ex-name">${exName}</div><div class="ex-tag tag-${ex.tag}">${ex.tag}</div></div>
      <div class="ex-badges"><span class="badge badge-reps">${ex.sets}x ${ex.reps}</span><span class="badge badge-rir">${phase.rir}</span></div>
      ${exNote?`<div class="ex-note">${exNote}</div>`:''}
      ${showProg?`<div class="ex-progress">${exProgress} <span>${t.guideline}</span></div>`:''}
      ${rows}
      <div id="vol-${CD}-${ei}">${volHTML(CD,ei)}</div>
    </div>`;
  });

  const savedNotes=localStorage.getItem(nKey(CW,CD))||'';
  c.innerHTML+=`<div class="notes-block"><label class="notes-label">${t.notes}</label><textarea placeholder="${t.notesPlaceholder}" data-di="${CD}" onchange="saveNote(this)">${savedNotes}</textarea></div>`;
}

function autoSave(inp){
  localStorage.setItem(fKey(CW,parseInt(inp.dataset.di),parseInt(inp.dataset.ei),parseInt(inp.dataset.s),inp.dataset.t),inp.value);
}
function saveNote(ta){
  localStorage.setItem(nKey(CW,parseInt(ta.dataset.di)),ta.value);
}
function liveUpdate(inp){
  autoSave(inp);
  const di=parseInt(inp.dataset.di),ei=parseInt(inp.dataset.ei);
  const volEl=document.getElementById('vol-'+di+'-'+ei);
  if(volEl) volEl.innerHTML=volHTML(di,ei);
}

async function saveWeek(){
  const t = UI_TEXT[LANG];
  const msg=document.getElementById('saveMsg');
  msg.style.display='block';
  msg.textContent=t.saving;
  document.querySelectorAll('input[data-di]').forEach(i=>autoSave(i));
  document.querySelectorAll('textarea[data-di]').forEach(t=>saveNote(t));
  const promises=[];
  SCHEMA[CD].exercises.forEach((ex,ei)=>{
    for(let s=0;s<ex.sets;s++){
      const w=localStorage.getItem(fKey(CW,CD,ei,s,'w'))||'';
      const r=localStorage.getItem(fKey(CW,CD,ei,s,'r'))||'';
      const rir=localStorage.getItem(fKey(CW,CD,ei,s,'rir'))||'';
      if(w||r||rir) promises.push(sbUpsert({client:CLIENT,week:CW,day:CD,exercise:ei,set_num:s,weight:w,reps:r,rir:rir}));
    }
  });
  const notes=localStorage.getItem(nKey(CW,CD))||'';
  if(notes) promises.push(sbUpsert({client:CLIENT,week:CW,day:CD,exercise:-1,set_num:-1,notes:notes}));
  await Promise.all(promises);
  buildNav();
  msg.textContent=t.saved;
  setTimeout(()=>msg.style.display='none',2500);
}

async function setDay(d){
  CD=d;
  [0,1,2].forEach(i=>document.getElementById('btn'+i).classList.toggle('active',i===d));
  await sbLoad(CW,d);
  buildNav();
  renderWeek();
  window.scrollTo(0,0);
}

let sx=0,sy=0;
document.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;sy=e.touches[0].clientY;},{passive:true});
document.addEventListener('touchend',async e=>{
  const dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>60&&Math.abs(dx)>Math.abs(dy)*1.5){
    if(dx<0&&CW<WEEKS){CW++;await sbLoad(CW,CD);buildNav();renderWeek();}
    else if(dx>0&&CW>1){CW--;await sbLoad(CW,CD);buildNav();renderWeek();}
  }
},{passive:true});

async function sendMagicLink(){
  const t = UI_TEXT[LANG];
  const email=document.getElementById('loginEmail').value.trim();
  if(!email){showLoginMsg(t.loginEmpty,'error');return;}
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent=t.loginSending;
  const {error}=await sb.auth.signInWithOtp({email,options:{emailRedirectTo:window.location.href}});
  if(error) showLoginMsg(t.loginError+error.message,'error');
  else showLoginMsg(t.loginSuccess,'success');
  btn.disabled=false;btn.textContent=t.loginBtn;
}
function showLoginMsg(msg,type){
  const el=document.getElementById('loginMsg');
  el.textContent=msg;el.className='lcard-msg '+type;
}
function showApp(){
  document.getElementById('loginScreen').classList.remove('show');
  document.getElementById('loginScreen').style.display='none';
  document.getElementById('appScreen').classList.add('show');
}
async function startApp(){
  await sbLoad(CW,CD);
  buildNav();
  renderWeek();
  document.getElementById('syncStatus').textContent=UI_TEXT[LANG].synced;
}
async function checkAuth(){
  const {data:{session}}=await sb.auth.getSession();
  if(session){showApp();await startApp();}
  else document.getElementById('loginScreen').classList.add('show');
  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){showApp();await startApp();}
  });
}


function setLang(l){
  LANG = l;
  document.getElementById('langEN').classList.toggle('active', l==='en');
  document.getElementById('langFR').classList.toggle('active', l==='fr');
  const t = UI_TEXT[l];
  document.getElementById('btn0').innerHTML = t.day1 + '<span class="day-label">' + t.day1sub + '</span>';
  document.getElementById('btn1').innerHTML = t.day2 + '<span class="day-label">' + t.day2sub + '</span>';
  document.getElementById('btn2').innerHTML = t.day3 + '<span class="day-label">' + t.day3sub + '</span>';
  document.getElementById('loginTitle').textContent = t.loginTitle;
  document.getElementById('loginSub').textContent = t.loginSub;
  document.getElementById('loginEmail').placeholder = t.loginPlaceholder;
  document.getElementById('loginBtn').textContent = t.loginBtn;
  document.querySelector('.btn-save').textContent = t.save;
  document.getElementById('saveMsg').textContent = t.saved;
  document.getElementById('syncStatus').textContent = t.synced;
  buildNav();
  renderWeek();
}

checkAuth();
</script>
